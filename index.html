<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MapMate v9.1.0-PRO | Tactical Tracking</title>

    <!-- Premium SEO & PWA Headers -->
    <meta name="description"
        content="MapMate: High-performance proximity discovery and real-time perimeter management.">
    <!-- Dynamic PWA Injection is handled by main.js to prevent CORS errors on file:// -->

    <!-- OpenStreetMap & Leaflet Suitability -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Supabase Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content text-center">
            <div class="splash-logo-container">
                <div class="splash-glow"></div>
                <div class="splash-core"></div>
            </div>
            <h1 class="splash-logo">MapMate</h1>
            <p class="splash-tagline">Initializing Secure Link...</p>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="header">
            <div id="sync-led" class="sync-led" title="Tactical Sync Status"></div>
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none"
                style="color: #3b82f6; margin-right: 12px;">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="map-search" placeholder="Search..." aria-label="Search map locations" autocomplete="off">
        </div>
        
        <!-- Tactical Narrator (Aria-Live) -->
        <div id="aria-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
        <div id="search-results" class="search-results hidden"></div>

        <div id="map"></div>

        <div class="map-controls">
            <button class="primary-fab" id="zoom-in" aria-label="Zoom In">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button class="primary-fab" id="zoom-out" aria-label="Zoom Out">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button class="primary-fab" id="locate-me" aria-label="Locate Me">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                </svg>
            </button>
            <button class="primary-fab" id="open-settings" aria-label="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
        </div>



        <!-- Tactical Unit Info Modal (Dialog Role) -->
        <div id="unit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="unit-modal-name">
            <div class="modal-content">
                <div class="luxury-marker-container" style="margin: 0 auto 16px auto; transform: scale(1.2);" aria-hidden="true">
                    <div class="luxury-glow"></div>
                    <div class="luxury-core"></div>
                </div>
                <h2 id="unit-modal-name" style="margin-bottom: 8px;">Operator Name</h2>
                <div id="unit-distance" style="color: #3b82f6; font-weight: 800; font-size: 1.2rem; margin-bottom: 4px;">-- m</div>
                <div style="color: #64748b; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.2em; margin-bottom: 24px;">TACTICAL RANGE</div>
                <div class="modal-actions">
                    <button id="unit-modal-close" class="modal-btn secondary" aria-label="Dismiss and return to map">Dismiss</button>
                </div>
            </div>
        </div>

        <!-- Identity Settings Modal (Dialog Role) -->
        <div id="settings-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
            <div class="modal-content">
                <h2 id="settings-title" style="margin-bottom: 24px;">Mission Config</h2>
                <div style="margin-bottom: 24px; text-align: left;">
                    <label for="settings-name-input"
                        style="display: block; font-size: 0.8rem; color: #64748b; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.1em;">OPERATOR CALLSIGN</label>
                    <input type="text" id="settings-name-input" class="p-input" placeholder="Enter Callsign...">
                </div>
                <div class="modal-actions">
                    <button id="settings-save" class="modal-btn primary">Save Config</button>
                    <button id="settings-close" class="modal-btn secondary">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Tactical Targeting Reticle (SCREEN CENTERED) -->
        <div class="tactical-reticle-container" style="position:absolute; top:50%; left:50%; width:1px; height:1px; transform:translate(-50%, -50%); z-index:4000; pointer-events:none;" aria-hidden="true">
            <div class="tactical-reticle"
                aria-label="Tactical Zoom Center: Activate for 200-meter reconnaissance view"></div>
        </div>

        <div class="version-tag">v9.7.3-PRO</div>
    </div>

    <!-- Leaflet Suitability -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="main.js?v=9.7.3"></script>
</body>

</html>
